name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Start application
        run: docker compose up -d --build

      - name: Wait for services to start
        run: sleep 45

      - name: Check running containers
        run: docker compose ps

      - name: Test backend
        run: |
          for i in $(seq 1 12); do
            nc -zv localhost 8081 2>/dev/null && exit 0
            sleep 5
          done
          exit 1

      - name: Test frontend
        run: |
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4200 || echo 000)
            [ "$STATUS" = "200" ] && exit 0
            sleep 5
          done

      - name: Stop containers
        if: always()
        run: docker compose down -v
